<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DotGit-Privacy Options</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
    h1 { border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .section { margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; }
    .danger { border-left: 4px solid #d00; }
    .warning-text { color: #d00; font-weight: bold; }
    label { display: block; margin-bottom: 10px; }
    input[type="checkbox"] { margin-right: 10px; }
    button { padding: 8px 16px; cursor: pointer; background: #0066cc; color: white; border: none; border-radius: 4px; }
    button:hover { background: #0055aa; }
    .saved { color: green; margin-left: 10px; display: none; }
  </style>
</head>
<body>
  <h1>DotGit-Privacy Options</h1>

  <div class="section">
    <h3>Core Checks</h3>
    <label><input type="checkbox" id="check-git"> .git (Git Repository)</label>
    <label><input type="checkbox" id="check-env"> .env (Environment Variables)</label>
    <label><input type="checkbox" id="check-svn"> .svn (Subversion)</label>
    <label><input type="checkbox" id="check-hg"> .hg (Mercurial)</label>
    <label><input type="checkbox" id="check-ds_store"> .DS_Store (macOS Metadata)</label>
    <label><input type="checkbox" id="check-securitytxt"> security.txt (Security Policy)</label>
    <label><input type="checkbox" id="check-venv"> env / venv (Python Virtual Environment)</label>
    <label><input type="checkbox" id="check-trace"> trace (Trace / Debug File)</label>
  </div>

  <div class="section">
    <h3>Web Server Checks</h3>
    <label><input type="checkbox" id="check-htaccess"> .htaccess (Apache Config)</label>
    <label><input type="checkbox" id="check-htpasswd"> .htpasswd (Apache Passwords)</label>
    <label><input type="checkbox" id="check-server_status"> server-status / server-info (Apache)</label>
    <label><input type="checkbox" id="check-phpinfo"> phpinfo.php (PHP Info Disclosure)</label>
    <label><input type="checkbox" id="check-robots"> robots.txt (Hidden Paths)</label>
    <label><input type="checkbox" id="check-sitemap"> sitemap.xml (Site Structure)</label>
    <label><input type="checkbox" id="check-crossdomain"> crossdomain.xml (Flash Policy)</label>
  </div>

  <div class="section">
    <h3>Application Framework Checks</h3>
    <label><input type="checkbox" id="check-wp_config_bak"> wp-config.php.bak (WordPress Backup)</label>
    <label><input type="checkbox" id="check-actuator"> /actuator (Spring Boot Actuator)</label>
    <label><input type="checkbox" id="check-graphql"> /graphql (GraphQL Endpoint)</label>
    <label><input type="checkbox" id="check-debug_pages"> Debug Pages (elmah, telescope, debugbar)</label>
    <label><input type="checkbox" id="check-composer"> composer.json (PHP Dependencies)</label>
    <label><input type="checkbox" id="check-package_json"> package.json (Node.js Dependencies)</label>
  </div>

  <div class="section">
    <h3>Data Exposure Checks</h3>
    <label><input type="checkbox" id="check-backup_files"> Backup Files (backup.zip, dump.sql, etc.)</label>
    <label><input type="checkbox" id="check-ssh_keys"> SSH Keys (.ssh/id_rsa)</label>
    <label><input type="checkbox" id="check-dockerenv"> .dockerenv (Docker Detection)</label>
  </div>

  <div class="section">
    <h3>Notifications</h3>
    <label><input type="checkbox" id="notification-new"> Notify when exposed items are found</label>
  </div>

  <div class="section">
    <h3>Stealth &amp; Rate Limiting</h3>
    <label>
      <input type="checkbox" id="stealth-mode">
      <strong>Stealth Mode</strong>
      <p style="font-size:0.9em; color:#666;">
        Adds delays between requests to avoid triggering WAFs and leaving obvious patterns in logs.
      </p>
    </label>
    <label>
      Request delay (ms):
      <input type="number" id="request-delay" min="0" max="5000" value="100" style="width: 70px; margin-left: 10px;">
      <p style="font-size:0.9em; color:#666;">
        Delay between batches of requests (0 = no delay). Higher = stealthier but slower.
      </p>
    </label>
  </div>

  <div class="section danger">
    <h3>Advanced &amp; Risky</h3>
    <label>
      <input type="checkbox" id="allow-downloads"> 
      <strong>Allow Downloads</strong>
      <p style="font-size:0.9em; color:#666;">
        Enabling this allows the extension to fetch and assemble .git content and save zips locally. 
        Files are processed locally.
      </p>
    </label>
    
    <label>
      <input type="checkbox" id="auto-scan-all"> 
      <strong>Automatic scanning for ALL sites</strong>
      <p class="warning-text">
        WARNING: Enabling this will request broad host permissions. 
        The extension will scan every site you visit automatically. 
        Use with caution.
      </p>
    </label>
  </div>

  <button id="save">Save Options</button>
  <span id="saved-msg" class="saved">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
